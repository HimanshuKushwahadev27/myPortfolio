<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rose to Red gradient matching website theme -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f06292;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef5350;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background inside circle -->
  <circle cx="128" cy="128" r="115" fill="#0A0A0A"/>

  <!-- Thick circular ring filling the gap -->
  <circle cx="128" cy="128" r="111.5" fill="none" stroke="url(#brandGradient)" stroke-width="8"/>

  <!-- Actual letters H and K inside the circle -->
  <g fill="url(#brandGradient)" font-family="'Inter', 'Montserrat', 'Space Grotesk', sans-serif" font-size="95" font-weight="700" letter-spacing="-5" text-anchor="middle" dominant-baseline="central">
    <text x="128" y="132">HK</text>
  </g>
</svg>
